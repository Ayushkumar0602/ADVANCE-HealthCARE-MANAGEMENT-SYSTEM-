<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Daily Goals Tracker</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 20px;
      background: linear-gradient(135deg, #fceabb, #f8b500);
      color: #333;
      min-height: 100vh;
    }

    h1 {
      text-align: center;
      color: #fff;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }

    .goal-card, .day-summary {
      background: #fff;
      padding: 20px;
      margin: 10px 0;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      animation: fadeIn 0.5s ease-in-out;
    }

    .goal-card h3, .day-summary h3 {
      margin: 0 0 10px;
      color: #ff9800;
    }

    .progress {
      background: #e0e0e0;
      border-radius: 12px;
      overflow: hidden;
      height: 16px;
      margin-bottom: 8px;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #00b09b, #96c93d);
      transition: width 0.4s ease-in-out;
    }

    .goal-actions {
      margin-top: 10px;
    }

    input, button {
      padding: 10px;
      margin: 5px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
      outline: none;
      transition: all 0.3s ease;
    }

    input:focus {
      border-color: #ff9800;
    }

    button {
      background: #ff9800;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #e68900;
    }

    .weekly-analytics {
      background: #fff3cd;
      padding: 20px;
      border-radius: 16px;
      margin-top: 20px;
      box-shadow: 0 6px 14px rgba(0,0,0,0.08);
      animation: fadeIn 0.5s ease-in-out;
    }

    #spinner {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      z-index: 1000;
      transform: translate(-50%, -50%);
    }

    .spinner {
      border: 6px solid #f3f3f3;
      border-top: 6px solid #ff9800;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(10px);}
      to {opacity: 1; transform: translateY(0);}
    }

    .input-group {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    #goalsContainer {
      animation: fadeIn 0.8s ease;
    }
  </style>
</head>
<body>
  <h1>🌟 Daily Goals Tracker</h1>

  <div class="input-group">
    <input type="text" id="goalName" placeholder="Goal Name (e.g., Drink Water)">
    <input type="number" id="target" placeholder="Target (e.g., 8)">
    <input type="text" id="unit" placeholder="Unit (e.g., glasses)">
    <button onclick="addGoal()">➕ Add Goal</button>
  </div>

  <div id="spinner"><div class="spinner"></div></div>

  <div id="goalsContainer"></div>

  <div class="weekly-analytics" id="weeklyAnalytics">
    <h2>📈 Weekly Summary</h2>
    <div id="weeklySummaryText"></div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDyBaQL4wHmFrllbQ1FyUDfGWf5H79u-2g",
      authDomain: "health-46f91.firebaseapp.com",
      projectId: "health-46f91",
      storageBucket: "health-46f91.appspot.com",
      messagingSenderId: "238309237516",
      appId: "1:238309237516:web:b58d6e76d1443960ac9f29"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser;

    auth.onAuthStateChanged(user => {
      if (user) {
        currentUser = user;
        loadWeeklyGoals();
      } else {
        window.location.href = "auth.html";
      }
    });

    async function addGoal() {
      const name = document.getElementById('goalName').value;
      const target = parseInt(document.getElementById('target').value);
      const unit = document.getElementById('unit').value;
      const today = new Date().toISOString().split('T')[0];
      const goalId = name.toLowerCase().replace(/\s+/g, '_');

      if (!name || !target || !unit) return alert("Fill all fields");

      await db.doc(`/users/${currentUser.uid}/dailyGoals/${today}/goals/${goalId}`).set({
        goalName: name,
        target: target,
        progress: 0,
        unit: unit,
        status: "pending",
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });

      loadWeeklyGoals();
    }

    async function updateProgress(date, goalId, current, target) {
      const newProgress = Math.min(current + 1, target);
      const status = newProgress >= target ? "completed" : "pending";

      await db.doc(`/users/${currentUser.uid}/dailyGoals/${date}/goals/${goalId}`).update({
        progress: newProgress,
        status: status
      });

      loadWeeklyGoals();
    }

    async function loadWeeklyGoals() {
      const container = document.getElementById('goalsContainer');
      const spinner = document.getElementById('spinner');
      spinner.style.display = 'block';
      container.innerHTML = "";

      const today = new Date();
      let totalGoals = 0, completedGoals = 0;

      for (let i = 6; i >= 0; i--) {
        const date = new Date(today);
        date.setDate(today.getDate() - i);
        const dateString = date.toISOString().split('T')[0];

        const snapshot = await db.collection(`/users/${currentUser.uid}/dailyGoals/${dateString}/goals`).get();

        if (!snapshot.empty) {
          const card = document.createElement('div');
          card.className = 'day-summary';
          card.innerHTML = `<h3>📅 ${dateString}</h3>`;

          snapshot.forEach(doc => {
            const goal = doc.data();
            totalGoals++;
            if (goal.status === 'completed') completedGoals++;

            const percent = (goal.progress / goal.target) * 100;

            const goalCard = document.createElement('div');
            goalCard.className = 'goal-card';
            goalCard.innerHTML = `
              <h3>${goal.goalName}</h3>
              <div class="progress">
                <div class="progress-bar" style="width:${percent}%"></div>
              </div>
              <p>${goal.progress}/${goal.target} ${goal.unit} (${goal.status})</p>
              <div class="goal-actions">
                ${goal.status !== "completed" ? `<button onclick="updateProgress('${dateString}', '${doc.id}', ${goal.progress}, ${goal.target})">+1 Progress</button>` : ""}
              </div>
            `;

            card.appendChild(goalCard);
          });

          container.appendChild(card);
        }
      }

      const percentComplete = totalGoals > 0 ? Math.round((completedGoals / totalGoals) * 100) : 0;
      document.getElementById("weeklySummaryText").innerHTML = `
        Total Goals: <strong>${totalGoals}</strong><br>
        Completed: <strong>${completedGoals}</strong><br>
        Completion Rate: <strong>${percentComplete}%</strong>
      `;

      spinner.style.display = 'none';
    }
  </script>
</body>
</html>
