<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Mental Health AI Chat</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" />
</head>
<body class="bg-gray-100 p-6">

  <h1 class="text-2xl font-bold text-center mb-4">🧠 Mental Health Assistant (Hume AI)</h1>

  <div id="chatBox" class="space-y-4 max-w-2xl mx-auto bg-white p-4 rounded shadow-md mb-4 h-96 overflow-y-scroll border"></div>

  <form id="userInputForm" class="max-w-2xl mx-auto flex gap-2">
    <input id="userInput" class="flex-grow p-2 border rounded" placeholder="Ask something..." />
    <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Send</button>
  </form>

  <pre id="debug" class="text-xs mt-6 bg-gray-200 p-2 rounded max-w-2xl mx-auto overflow-x-auto"></pre>

  <script>
    // Firebase config
    const firebaseConfig = {
      apiKey: "YOUR_FIREBASE_API_KEY",
      authDomain: "YOUR_FIREBASE_AUTH_DOMAIN",
      projectId: "YOUR_FIREBASE_PROJECT_ID",
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const userInputForm = document.getElementById("userInputForm");
    const userInput = document.getElementById("userInput");
    const chatBox = document.getElementById("chatBox");
    const debug = document.getElementById("debug");

    let conversationHistory = [];

    async function callHumAI(message) {
      try {
        const response = await fetch("https://basalt-nine-handsaw.glitch.me/hume", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            model: "gpt-3.5-turbo",
            messages: conversationHistory.concat({ role: "user", content: message })
          })
        });

        const data = await response.json();
        debug.innerText = JSON.stringify(data, null, 2);

        const aiMessage = data.choices?.[0]?.message?.content || "⚠️ No response from AI.";
        conversationHistory.push({ role: "user", content: message });
        conversationHistory.push({ role: "assistant", content: aiMessage });

        renderMessage("user", message);
        renderMessage("assistant", aiMessage);
      } catch (error) {
        debug.innerText = `❌ Error calling Hume AI: ${error}`;
        console.error("❌ Error calling Hume AI:", error);
      }
    }

    function renderMessage(role, content) {
      const div = document.createElement("div");
      div.className = role === "user"
        ? "text-right text-blue-700 font-medium bg-blue-100 p-3 rounded-lg"
        : "text-left text-purple-800 font-medium bg-purple-100 p-3 rounded-lg";
      div.textContent = content;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    userInputForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const msg = userInput.value.trim();
      if (!msg) return;
      userInput.value = "";
      await callHumAI(msg);
    });

    async function loadMentalHealthData(userId) {
      try {
        const docRef = db.collection("mentalhealth").doc(userId);
        const docSnap = await docRef.get();
        if (docSnap.exists) {
          const data = docSnap.data();
          const msg = `The user has submitted the following mental health data:\n${Object.entries(data)
            .map(([key, value]) => `${key}: ${value}`)
            .join("\n")}`;
          await callHumAI(msg);
        } else {
          renderMessage("assistant", "❌ No mental health data found.");
        }
      } catch (err) {
        debug.innerText = `❌ Error loading mental health data: ${err}`;
        console.error("Error loading mental health data:", err);
      }
    }

    auth.onAuthStateChanged(async (user) => {
      if (!user) {
        window.location.href = "auth.html";
        return;
      }
      await loadMentalHealthData(user.uid);
    });
  </script>
</body>
</html>
