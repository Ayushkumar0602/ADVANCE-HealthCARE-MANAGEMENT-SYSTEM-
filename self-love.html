<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Self-Love Mirror</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #fef6f9;
      text-align: center;
      padding: 30px;
      color: #333;
    }

    video {
      border-radius: 12px;
      width: 300px;
      height: 225px;
      margin-bottom: 20px;
      border: 4px solid #ffb6c1;
      box-shadow: 0 4px 12px rgba(255, 182, 193, 0.3);
    }

    input {
      width: 80%;
      max-width: 400px;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      background-color: #ff69b4;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 15px;
    }

    button:hover {
      background-color: #ff85c1;
    }

    .container {
      max-width: 600px;
      margin: auto;
    }

    .affirmation-list {
      margin-top: 30px;
      padding: 10px;
      background-color: #ffeff1;
      border-radius: 8px;
    }

    .affirmation-item {
      background-color: #fff;
      margin: 10px 0;
      padding: 10px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .affirmation-date {
      color: #888;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>💖 Self-Love Mirror</h1>
    <video id="webcam" autoplay playsinline></video>

    <p>Look into the mirror and write 3 things you love about yourself ✨</p>

    <input type="text" id="affirmation1" placeholder="I love that I am..." />
    <input type="text" id="affirmation2" placeholder="I love that I can..." />
    <input type="text" id="affirmation3" placeholder="I love how I..." />
    <br>
    <button onclick="saveAffirmations()">Save Affirmations</button>

    <div class="affirmation-list" id="affirmation-list">
      <h3>Your Past Affirmations:</h3>
      <!-- Past affirmations will appear here -->
    </div>
  </div>

  <script>
    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyDyBaQL4wHmFrllbQ1FyUDfGWf5H79u-2g",
      authDomain: "health-46f91.firebaseapp.com",
      projectId: "health-46f91",
      storageBucket: "health-46f91.appspot.com",
      messagingSenderId: "238309237516",
      appId: "1:238309237516:web:b58d6e76d1443960ac9f29"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // Check if the user is logged in
    auth.onAuthStateChanged((user) => {
      if (!user) {
        // Redirect to login page if not logged in
        window.location.href = "auth.html"; // Replace with your login page URL
      } else {
        // Fetch and display past affirmations when user is logged in
        fetchPastAffirmations(user);
      }
    });

    // Webcam setup
    const video = document.getElementById('webcam');
    navigator.mediaDevices.getUserMedia({ video: true })
      .then((stream) => {
        video.srcObject = stream;
      })
      .catch((err) => {
        console.error("Webcam access denied", err);
      });

    // Save affirmations to Firestore
    function saveAffirmations() {
      const aff1 = document.getElementById('affirmation1').value;
      const aff2 = document.getElementById('affirmation2').value;
      const aff3 = document.getElementById('affirmation3').value;

      if (!aff1 || !aff2 || !aff3) {
        alert("Please fill all 3 affirmations 💬");
        return;
      }

      // Get the current user and save their affirmations
      auth.onAuthStateChanged((user) => {
        if (user) {
          const timestamp = new Date();

          db.collection('affirmations').doc(user.uid).collection('daily').add({
            affirmation1: aff1,
            affirmation2: aff2,
            affirmation3: aff3,
            timestamp: timestamp
          }).then(() => {
            alert("Affirmations saved! 🌈 You’re amazing!");
            fetchPastAffirmations(user); // Re-fetch the affirmations after saving
          }).catch((error) => {
            console.error("Error saving affirmations: ", error);
          });
        } else {
          alert("Please log in to save your affirmations.");
        }
      });
    }

    // Fetch past affirmations and display them
    function fetchPastAffirmations(user) {
      db.collection('affirmations').doc(user.uid).collection('daily')
        .orderBy('timestamp', 'desc')
        .get()
        .then((querySnapshot) => {
          const affirmationList = document.getElementById('affirmation-list');
          affirmationList.innerHTML = "<h3>Your Past Affirmations:</h3>"; // Reset the list

          querySnapshot.forEach((doc) => {
            const data = doc.data();
            const affirmationDiv = document.createElement('div');
            affirmationDiv.classList.add('affirmation-item');

            const date = new Date(data.timestamp.seconds * 1000); // Convert Firestore timestamp to JS Date
            const dateStr = date.toLocaleDateString();

            affirmationDiv.innerHTML = `
              <p><strong>Affirmation 1:</strong> ${data.affirmation1}</p>
              <p><strong>Affirmation 2:</strong> ${data.affirmation2}</p>
              <p><strong>Affirmation 3:</strong> ${data.affirmation3}</p>
              <p class="affirmation-date">Saved on: ${dateStr}</p>
            `;
            affirmationList.appendChild(affirmationDiv);
          });
        })
        .catch((error) => {
          console.error("Error fetching affirmations: ", error);
        });
    }
  </script>
</body>
</html>
