<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>View Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js"></script>
</head>
<body class="bg-gradient-to-br from-indigo-100 via-purple-100 to-pink-100 min-h-screen font-sans flex items-center justify-center py-10 px-4">

  <div class="w-full max-w-2xl bg-white/90 backdrop-blur-xl shadow-2xl rounded-3xl p-8 space-y-6 animate-fade-in">
    <div class="flex items-center justify-between">
      <h1 class="text-3xl font-extrabold text-indigo-700 animate-slide-in-down">👤 Your Profile</h1>
      <a href="dashboard.html" class="bg-gradient-to-r from-indigo-500 to-purple-500 text-white px-4 py-2 rounded-xl shadow-md hover:from-indigo-600 hover:to-purple-600 transition duration-300">
        🔙 Dashboard
      </a>
    </div>

    <form id="profileForm" class="space-y-5" autocomplete="off">
      <input type="text" id="name" class="border border-gray-300 w-full p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-400 transition" placeholder="Name" disabled />
      <input type="number" id="age" class="border border-gray-300 w-full p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-400 transition" placeholder="Age" disabled />
      <select id="gender" class="border border-gray-300 w-full p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-400 transition" disabled>
        <option value="">Select Gender</option>
        <option value="Male">Male</option>
        <option value="Female">Female</option>
      </select>
      <input type="tel" id="phone" class="border border-gray-300 w-full p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-400 transition" placeholder="Phone Number" disabled />
      <textarea id="address" class="border border-gray-300 w-full p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-400 transition resize-none" placeholder="Address" disabled></textarea>

      <div class="flex items-center gap-4">
        <button type="button" id="editBtn" class="bg-gradient-to-r from-yellow-400 to-yellow-500 text-white px-5 py-2 rounded-xl hover:from-yellow-500 hover:to-yellow-600 transition duration-300 shadow">
          ✏️ Edit
        </button>
        <button type="submit" id="saveBtn" class="bg-gradient-to-r from-green-400 to-green-500 text-white px-5 py-2 rounded-xl hover:from-green-500 hover:to-green-600 transition duration-300 shadow hidden">
          💾 Save Changes
        </button>
      </div>
      <p id="status" class="text-sm text-green-600 mt-2 font-medium"></p>
    </form>
  </div>

  <!-- Animations -->
  <style>
    @keyframes fade-in {
      0% { opacity: 0; transform: scale(0.95); }
      100% { opacity: 1; transform: scale(1); }
    }

    @keyframes slide-in-down {
      0% { opacity: 0; transform: translateY(-10px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .animate-fade-in {
      animation: fade-in 0.7s ease-out forwards;
    }

    .animate-slide-in-down {
      animation: slide-in-down 0.6s ease-out forwards;
    }
  </style>

  <!-- Firebase Script (unchanged logic) -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";
    import {
      getFirestore,
      doc,
      getDoc,
      updateDoc
    } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDyBaQL4wHmFrllbQ1FyUDfGWf5H79u-2g",
      authDomain: "health-46f91.firebaseapp.com",
      projectId: "health-46f91",
      storageBucket: "health-46f91.appspot.com",
      messagingSenderId: "238309237516",
      appId: "1:238309237516:web:b58d6e76d1443960ac9f29"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const name = document.getElementById("name");
    const age = document.getElementById("age");
    const gender = document.getElementById("gender");
    const phone = document.getElementById("phone");
    const address = document.getElementById("address");
    const form = document.getElementById("profileForm");
    const editBtn = document.getElementById("editBtn");
    const saveBtn = document.getElementById("saveBtn");
    const status = document.getElementById("status");

    let userDocRef;

    const setEditable = (editable) => {
      name.disabled = !editable;
      age.disabled = !editable;
      gender.disabled = !editable;
      phone.disabled = !editable;
      address.disabled = !editable;
      saveBtn.classList.toggle("hidden", !editable);
      editBtn.textContent = editable ? "🚫 Cancel" : "✏️ Edit";
    };

    let isEditing = false;

    editBtn.addEventListener("click", () => {
      isEditing = !isEditing;
      setEditable(isEditing);
      if (!isEditing) {
        status.textContent = "";
      }
    });

    onAuthStateChanged(auth, async (user) => {
      if (!user) return window.location.href = "auth.html";
      userDocRef = doc(db, "users", user.uid);
      const snapshot = await getDoc(userDocRef);
      if (snapshot.exists()) {
        const data = snapshot.data();
        name.value = data.name || "";
        age.value = data.age || "";
        gender.value = data.gender || "";
        phone.value = data.phone || "";
        address.value = data.address || "";
      }
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      if (!isEditing) return;
      await updateDoc(userDocRef, {
        name: name.value,
        age: age.value,
        gender: gender.value,
        phone: phone.value,
        address: address.value
      });
      status.textContent = "✅ Profile updated successfully!";
      setEditable(false);
      isEditing = false;
    });
  </script>
</body>
</html>
