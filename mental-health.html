<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mental Health Form</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-green-100 via-blue-100 to-purple-200 min-h-screen flex items-center justify-center">
  <div class="bg-white p-8 rounded-xl shadow-xl w-full max-w-xl">
    <h2 class="text-2xl font-bold mb-6 text-center text-blue-700">🧠 Mental Health Check-In</h2>

    <form id="mentalHealthForm" class="space-y-4">
      <textarea id="mentalStatus" rows="5" placeholder="How are you feeling today? Be as detailed as you want..."
        class="w-full p-4 border border-blue-300 rounded-md focus:ring-2 focus:ring-blue-500" required></textarea>
      <button type="submit"
        class="w-full bg-gradient-to-r from-blue-500 to-purple-600 text-white p-3 rounded-md font-semibold hover:from-blue-600 hover:to-purple-700 transition">
        Submit
      </button>
    </form>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
    import {
      getAuth,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";
    import {
      getFirestore,
      doc,
      setDoc
    } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDyBaQL4wHmFrllbQ1FyUDfGWf5H79u-2g",
      authDomain: "health-46f91.firebaseapp.com",
      projectId: "health-46f91",
      storageBucket: "health-46f91.appspot.com",
      messagingSenderId: "238309237516",
      appId: "1:238309237516:web:b58d6e76d1443960ac9f29"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const form = document.getElementById("mentalHealthForm");

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = "auth.html";
        return;
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const mentalStatus = document.getElementById("mentalStatus").value;

        try {
          await setDoc(doc(db, "mentalhealth", user.uid), {
            userId: user.uid,
            message: mentalStatus,
            timestamp: new Date()
          });

          window.location.href = "mental-ai.html";
        } catch (err) {
          console.error("Error saving mental health status:", err);
          alert("Error submitting. Please try again.");
        }
      });
    });
  </script>
</body>

</html>
