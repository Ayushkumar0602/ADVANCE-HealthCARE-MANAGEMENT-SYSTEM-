<!-- metrics.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Health Metrics Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js"></script>

  <script>
    const firebaseConfig = {
            apiKey: "AIzaSyDyBaQL4wHmFrllbQ1FyUDfGWf5H79u-2g",
            authDomain: "health-46f91.firebaseapp.com",
            projectId: "health-46f91",
            storageBucket: "health-46f91.firebasestorage.app",
            messagingSenderId: "238309237516",
            appId: "1:238309237516:web:b58d6e76d1443960ac9f29",
            measurementId: "G-TF76QCDK7C"
        };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
  </script>
</head>
<body class="bg-gray-100 min-h-screen">
  <nav class="bg-blue-600 text-white p-4 flex justify-between items-center">
    <h1 class="text-xl font-bold">Health Metrics</h1>
    <button id="backBtn" class="bg-gray-200 text-blue-600 px-4 py-1 rounded">Back</button>
  </nav>

  <main class="max-w-2xl mx-auto mt-8 p-6 bg-white rounded shadow">
    <h2 class="text-xl font-semibold mb-4">Your Live Health Data</h2>

    <div class="space-y-4 text-lg">
      <p><strong>Heart Rate:</strong> <span id="heartRate">--</span> bpm</p>
      <p><strong>Blood Pressure:</strong> <span id="bp">--</span> mmHg</p>
      <p><strong>Glucose Level:</strong> <span id="glucose">--</span> mg/dL</p>
      <p><strong>Oxygen Saturation:</strong> <span id="oxygen">--</span> %</p>
      <p><strong>Temperature:</strong> <span id="temp">--</span> °C</p>
    </div>
  </main>

  <script>
    const heartRate = document.getElementById('heartRate');
    const bp = document.getElementById('bp');
    const glucose = document.getElementById('glucose');
    const oxygen = document.getElementById('oxygen');
    const temp = document.getElementById('temp');
    const backBtn = document.getElementById('backBtn');

    backBtn.onclick = () => window.location.href = 'dashboard.html';

    auth.onAuthStateChanged((user) => {
      if (!user) return window.location.href = 'auth.html';

      const docRef = db.collection('users').doc(user.uid).collection('metrics').doc('vitals');

      docRef.onSnapshot((doc) => {
        if (doc.exists) {
          const data = doc.data();
          heartRate.textContent = data.heartRate || '--';
          bp.textContent = data.bp || '--';
          glucose.textContent = data.glucose || '--';
          oxygen.textContent = data.oxygen || '--';
          temp.textContent = data.temp || '--';
        }
      });
    });
  </script>
</body>
</html>
