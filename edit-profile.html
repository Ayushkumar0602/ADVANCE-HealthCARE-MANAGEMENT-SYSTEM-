<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Edit Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js"></script>
</head>
<body class="flex bg-gray-100 min-h-screen">

  <!-- Sidebar -->
  <aside class="w-64 bg-white shadow-lg h-screen p-6">
    <h2 class="text-2xl font-bold mb-8">Healthcare</h2>
    <nav class="flex flex-col gap-4">
      <a href="dashboard.html" class="hover:text-blue-600">🏠 Dashboard</a>
      <a href="profile.html" class="text-blue-600 underline">👤 Edit Profile</a>
      <a href="upload.html" class="hover:text-blue-600">📂 Upload Reports</a>
      <a href="stats.html" class="hover:text-blue-600">📊 Health Stats</a>
    </nav>
  </aside>

  <!-- Main content -->
  <main class="flex-1 p-8">
    <h1 class="text-2xl font-semibold mb-6">Edit Your Profile</h1>
    <form id="profileForm" class="bg-white p-6 rounded shadow max-w-md space-y-4">
      <input type="text" id="name" placeholder="Full Name" class="border w-full p-2 rounded" required />
      <input type="number" id="age" placeholder="Age" class="border w-full p-2 rounded" required />
      <select id="gender" class="border w-full p-2 rounded" required>
        <option value="">Select Gender</option>
        <option value="Male">Male</option>
        <option value="Female">Female</option>
      </select>
      <button class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600" type="submit">
        Save Changes
      </button>
      <p id="status" class="text-green-500 text-sm"></p>
    </form>
  </main>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDyBaQL4wHmFrllbQ1FyUDfGWf5H79u-2g",
      authDomain: "health-46f91.firebaseapp.com",
      projectId: "health-46f91",
      storageBucket: "health-46f91.appspot.com",
      messagingSenderId: "238309237516",
      appId: "1:238309237516:web:b58d6e76d1443960ac9f29"
    };

    const app = firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUID = null;

    auth.onAuthStateChanged(async (user) => {
      if (!user) return window.location.href = "auth.html";
      currentUID = user.uid;

      const doc = await db.collection("users").doc(currentUID).get();
      if (doc.exists) {
        const data = doc.data();
        document.getElementById("name").value = data.name || '';
        document.getElementById("age").value = data.age || '';
        document.getElementById("gender").value = data.gender || '';
      }
    });

    document.getElementById("profileForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      await db.collection("users").doc(currentUID).set({
        name: name.value,
        age: age.value,
        gender: gender.value
      }, { merge: true });

      document.getElementById("status").textContent = "Profile updated!";
    });
  </script>
</body>
</html>
