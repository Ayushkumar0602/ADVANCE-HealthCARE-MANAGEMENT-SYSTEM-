<!DOCTYPE html>
<html lang="en" class="transition duration-300">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Email Verification | Smart Healthcare</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@2.6.4/dist/email.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet"/>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            inter: ['Inter', 'sans-serif'],
          },
          colors: {
            primary: '#4F46E5',
            secondary: '#06B6D4',
            accent: '#F43F5E',
          },
        }
      }
    };
  </script>

  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
</head>

<body class="bg-gradient-to-br from-blue-100 via-white to-purple-100 dark:from-gray-900 dark:via-gray-800 dark:to-gray-900 min-h-screen flex items-center justify-center transition-all duration-300 px-4">
  <div class="bg-white dark:bg-gray-800 shadow-xl rounded-2xl max-w-md w-full p-8 text-gray-800 dark:text-gray-100 space-y-6 animate-fadeIn">
    <div class="text-center">
      <h2 class="text-3xl font-bold">🔐 Verify OTP</h2>
      <p class="text-sm text-gray-500 dark:text-gray-400">Check your email for the 6-digit OTP</p>
    </div>

    <div class="space-y-4">
      <input id="otpInput" type="text" maxlength="6" placeholder="Enter 6-digit OTP"
        class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-900 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-primary transition text-center text-lg tracking-widest" />

      <p id="errorMsg" class="text-center text-red-500 text-sm hidden">❌ Incorrect OTP</p>

      <button id="verifyBtn"
        class="w-full py-3 rounded-xl bg-gradient-to-r from-primary to-secondary text-white text-lg font-semibold shadow-md hover:shadow-xl hover:scale-[1.02] transition-all duration-300">
        Verify & Continue
      </button>

      <button id="resendBtn" class="block mx-auto text-blue-600 dark:text-blue-400 text-sm hover:underline transition-all">
        🔄 Resend OTP
      </button>
    </div>
  </div>

  <script>
    emailjs.init("GvH9iilO0RUT1NsZ5"); // Replace with your EmailJS public key

    const otpInput = document.getElementById("otpInput");
    const verifyBtn = document.getElementById("verifyBtn");
    const errorMsg = document.getElementById("errorMsg");
    const resendBtn = document.getElementById("resendBtn");

    // Get email and OTP from localStorage
    let storedOtp = localStorage.getItem("otp");
    const email = localStorage.getItem("otp_email");

    console.log("📦 Loaded OTP:", storedOtp);
    console.log("📧 Target email:", email);

    verifyBtn.addEventListener("click", () => {
      const enteredOtp = otpInput.value.trim();
      if (enteredOtp === storedOtp) {
        errorMsg.classList.add("hidden");
        localStorage.removeItem("otp");
        localStorage.removeItem("otp_email");
        window.location.href = "doctor-info.html";
      } else {
        errorMsg.classList.remove("hidden");
      }
    });

    resendBtn.addEventListener("click", () => {
      if (!email) {
        alert("Email not found. Please sign up again.");
        return;
      }

      const newOtp = Math.floor(100000 + Math.random() * 900000).toString();
      localStorage.setItem("otp", newOtp);
      storedOtp = newOtp;

      console.log("🔄 New OTP:", newOtp);
      console.log("📧 Resending to:", email);

      emailjs.send("service_ui0p02j", "template_98fk3ee", {
        to_email: email,
        otp: newOtp
      }).then(() => {
        alert("✅ OTP resent successfully.");
      }).catch((error) => {
        console.error("❌ Resend failed:", error);
        alert("❌ Failed to resend OTP.");
      });
    });
  </script>
</body>
</html>
