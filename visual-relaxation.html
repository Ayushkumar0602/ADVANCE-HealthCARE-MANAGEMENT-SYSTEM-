<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Relaxing Video</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1c1c1c; /* Dark background */
      font-family: 'Segoe UI', sans-serif;
      color: white;
      overflow: hidden;
      position: relative;
    }

    /* YouTube iframe */
    #player {
      width: 90%;  /* Increased video size */
      height: 90%; /* Increased video size */
      border: none;
      border-radius: 20px;
    }

    /* Back Button */
    .back-button {
      position: absolute;
      top: 20px;
      left: 20px;
      background-color: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 10px 20px;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      border-radius: 10px;
      transition: background-color 0.3s ease;
    }

    .back-button:hover {
      background-color: rgba(0, 0, 0, 0.9);
    }

  </style>
</head>
<body>

  <!-- Back Button -->
  <button class="back-button" onclick="window.location.href='dashboard.html'">Back</button>

  <!-- YouTube API Script -->
  <script>
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    var firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    var player;

    function onYouTubeIframeAPIReady() {
      player = new YT.Player('player', {
        videoId: 'KJwYBJMSbPI', // YouTube video ID
        playerVars: {
          autoplay: 1,
          controls: 0, // Hide controls
          modestbranding: 1, // Hide YouTube logo
          rel: 0, // No related videos at the end
          showinfo: 0, // Hide info (title, uploader)
          fs: 0, // Disable fullscreen button
          autohide: 1 // Hide controls after a short time
        },
        events: {
          onReady: onPlayerReady
        }
      });
    }

    function onPlayerReady(event) {
      // Player is ready, start playing automatically
      event.target.playVideo();
    }
  </script>

  <!-- YouTube Video Embed -->
  <div id="player"></div>

</body>
</html>
