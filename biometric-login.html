<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Biometric Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-50 flex items-center justify-center min-h-screen">
  <div class="bg-white p-8 rounded shadow-lg w-full max-w-md text-center space-y-4">
    <h2 class="text-xl font-bold">Face ID / Fingerprint Login</h2>
    <p class="text-sm text-gray-600">Verify with your device's biometric system.</p>
    <button id="loginBtn" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">
      Verify Biometric
    </button>
    <p id="statusMsg" class="text-sm text-red-500 mt-2"></p>
  </div>

  <script type="module">
    import {
      getAuth,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";
    import {
      getFirestore,
      doc,
      getDoc
    } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js";
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDyBaQL4wHmFrllbQ1FyUDfGWf5H79u-2g",
      authDomain: "health-46f91.firebaseapp.com",
      projectId: "health-46f91",
      storageBucket: "health-46f91.appspot.com",
      messagingSenderId: "238309237516",
      appId: "1:238309237516:web:b58d6e76d1443960ac9f29"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const loginBtn = document.getElementById("loginBtn");
    const statusMsg = document.getElementById("statusMsg");

    loginBtn.addEventListener("click", async () => {
      onAuthStateChanged(auth, async (user) => {
        if (!user) return;

        const uid = user.uid;
        const docSnap = await getDoc(doc(db, "doctors", uid));
        if (!docSnap.exists() || !docSnap.data().credentialId) {
          statusMsg.textContent = "No biometric credentials found.";
          return;
        }

        const credId = Uint8Array.from(atob(docSnap.data().credentialId), c => c.charCodeAt(0));
        const challenge = new Uint8Array(32);
        window.crypto.getRandomValues(challenge);

        const publicKey = {
          challenge,
          allowCredentials: [{
            id: credId,
            type: "public-key",
            transports: ["internal"]
          }],
          timeout: 60000,
          userVerification: "required"
        };

        try {
          await navigator.credentials.get({ publicKey });
          window.location.href = "enter-patient.html";
        } catch (err) {
          console.error("Biometric login failed:", err);
          statusMsg.textContent = "Biometric login failed: " + err.name;
        }
      });
    });
  </script>
</body>
</html>
