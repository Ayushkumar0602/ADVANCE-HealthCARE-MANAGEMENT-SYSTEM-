<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Biometric Setup</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-50 flex items-center justify-center min-h-screen">
  <div class="bg-white p-8 rounded shadow-lg w-full max-w-md text-center space-y-4">
    <h2 class="text-xl font-bold">Setup Face ID / Fingerprint</h2>
    <p class="text-sm text-gray-600">Your device’s Face ID or Fingerprint will be used for login.</p>
    <button id="registerBtn" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
      Register Biometric
    </button>
    <p id="statusMsg" class="text-sm text-red-500 mt-2"></p>
  </div>

  <script type="module">
    import {
      getAuth,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";
    import {
      getFirestore,
      doc,
      setDoc
    } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js";
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDyBaQL4wHmFrllbQ1FyUDfGWf5H79u-2g",
      authDomain: "health-46f91.firebaseapp.com",
      projectId: "health-46f91",
      storageBucket: "health-46f91.appspot.com",
      messagingSenderId: "238309237516",
      appId: "1:238309237516:web:b58d6e76d1443960ac9f29"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const registerBtn = document.getElementById("registerBtn");
    const statusMsg = document.getElementById("statusMsg");

    registerBtn.addEventListener("click", async () => {
      onAuthStateChanged(auth, async (user) => {
        if (!user) return;

        const uid = user.uid;
        const email = user.email;
        const challenge = new Uint8Array(32);
        window.crypto.getRandomValues(challenge);

        const publicKey = {
          challenge,
          rp: { name: "Smart Healthcare" },
          user: {
            id: Uint8Array.from(uid, c => c.charCodeAt(0)),
            name: email,
            displayName: email
          },
          pubKeyCredParams: [{ alg: -7, type: "public-key" }],
          authenticatorSelection: {
            authenticatorAttachment: "platform", // Face ID/Fingerprint
            userVerification: "required"
          },
          timeout: 60000,
          attestation: "none"
        };

        try {
          const credential = await navigator.credentials.create({ publicKey });

          const credID = btoa(String.fromCharCode(...new Uint8Array(credential.rawId)));
          await setDoc(doc(db, "doctors", uid), {
            email,
            credentialId: credID
          }, { merge: true });

          window.location.href = "enter-patient.html";
        } catch (err) {
          console.error("Biometric registration failed:", err);
          statusMsg.textContent = "Biometric registration failed: " + err.name;
        }
      });
    });
  </script>
</body>
</html>
